<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jun Heng — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Manrope:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the saved/time-of-day theme before paint to avoid a flash.
      (function () {
        var hour = new Date().getHours();
        var timeTheme = hour >= 7 && hour < 19 ? "light" : "dark";
        var theme = localStorage.getItem("theme") || timeTheme;
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
